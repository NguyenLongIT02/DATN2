version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass yourStrongPassword
    networks:
      - backend-network

volumes:
  redis-data:

networks:
  backend-network:
    driver: bridge